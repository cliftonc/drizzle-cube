services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: drizzle_cube_test
    ports:
      - "54333:5432"  # Use 54333 to avoid conflicts with other projects

  mysql:
    image: mysql:9.7
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: drizzle_cube_test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - "33077:3306"  # Use 33077 to avoid conflicts with other projects

  databend:
    image: datafuselabs/databend
    environment:
      QUERY_DEFAULT_USER: databend
      QUERY_DEFAULT_PASSWORD: databend
    ports:
      - "18000:8000"  # Use 18000 to avoid conflicts with other tools
    volumes:
      - databend-meta:/var/lib/databend/meta
      - databend-query:/var/lib/databend/query
      - databend-logs:/var/log/databend
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  databend-meta:
  databend-query:
  databend-logs:
