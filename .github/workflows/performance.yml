name: Performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  performance:
    runs-on: ubuntu-latest
    permissions:
      # write needed so the benchmark action can push history to the gh-pages branch
      contents: write
      pull-requests: write

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: drizzle_cube_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: timeout 60 bash -c 'until nc -z localhost 5433; do echo "Waiting for PostgreSQL..."; sleep 1; done'

      - name: Run performance benchmarks
        run: npm run perf
        env:
          TEST_DB_TYPE: postgres
          TEST_DATABASE_URL: postgres://test:test@localhost:5433/drizzle_cube_test
          PERF_DATABASE_URL: postgres://test:test@localhost:5433/drizzle_cube_perf_test
          PERF_ITERATIONS: '5'
          PERF_WARMUP: '2'

      - name: Publish job summary
        if: always()
        run: cat perf-results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results
          path: perf-results/

      # Note: the full "⚡ Performance benchmarks" report is intentionally NOT posted
      # as a PR comment — it's available in the job summary above and the uploaded
      # artifact. (gh-pages history + regression alerts below are unaffected.)

      # Persist history to the gh-pages branch (dev/bench/) on pushes to main only,
      # so trends accumulate outside the code branches — no circular commits to source.
      # PRs deliberately skip this: forks can't push, and we don't want PR runs in history.
      - name: Store benchmark history
        if: github.event_name == 'push'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: drizzle-cube
          tool: customSmallerIsBetter
          output-file-path: perf-results/benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: true
          # CI runners vary 2-3x run-to-run, so alert only on a sustained 2x+ regression
          # and never fail the build — this suite is report-only.
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true
