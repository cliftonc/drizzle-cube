name: Publish to NPM

on:
  release:
    types: [created]

permissions:
  id-token: write  # Required for OIDC
  contents: read
  discussions: write
  
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for CI to pass
        run: |
          COMMIT_SHA=${{ github.sha }}
          echo "Waiting for CI to pass on commit $COMMIT_SHA..."

          MAX_WAIT=600  # 10 minutes
          INTERVAL=15
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RUN_JSON=$(gh run list --commit $COMMIT_SHA --workflow ci.yml --json databaseId,status,conclusion --jq '.[0]')

            if [ -z "$RUN_JSON" ] || [ "$RUN_JSON" = "null" ]; then
              echo "No CI run found yet for $COMMIT_SHA, waiting... (${ELAPSED}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi

            STATUS=$(echo "$RUN_JSON" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion')
            RUN_ID=$(echo "$RUN_JSON" | jq -r '.databaseId')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passed for commit $COMMIT_SHA (run $RUN_ID)"
                exit 0
              else
                echo "CI failed for commit $COMMIT_SHA (conclusion: $CONCLUSION, run $RUN_ID)"
                exit 1
              fi
            fi

            echo "CI still running (status: $STATUS, run $RUN_ID), waiting... (${ELAPSED}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timed out waiting for CI on commit $COMMIT_SHA after ${MAX_WAIT}s"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to NPM
        run: npm publish --access public

      - name: Post to GitHub Discussions
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          DISCUSSION_BODY="${RELEASE_BODY}

          ---
          [View full release on GitHub](${RELEASE_URL}) | [NPM package](https://www.npmjs.com/package/drizzle-cube/v/${VERSION})"

          gh api graphql -f query='
            mutation($repoId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
              createDiscussion(input: {repositoryId: $repoId, categoryId: $categoryId, title: $title, body: $body}) {
                discussion { url }
              }
            }' \
            -f repoId="R_kgDOPfOdig" \
            -f categoryId="DIC_kwDOPfOdis4Cuiyt" \
            -f title="$RELEASE_NAME" \
            -f body="$DISCUSSION_BODY"

      - name: Post to Discord
        if: success()
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_RELEASES_WEBHOOK }}
          color: "5793266"
          username: "Drizzle Cube"
          footer_title: "drizzle-cube"
          reduce_headings: true

